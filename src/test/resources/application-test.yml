spring:
  datasource:
    url: jdbc:h2:mem:silog_user_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop   # In tests, Hibernate creates the schema from entities
    open-in-view: false
  flyway:
    enabled: false            # Flyway is disabled in tests — H2 handles schema via ddl-auto
