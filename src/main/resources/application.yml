spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/silog_db
    username: admin
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false   # ⬅️ cambiar esto

  flyway:
    enabled: false

server:
  port: ${PORT:8080}     # ⬅️ ESTE ES CLAVE
