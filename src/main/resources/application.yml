spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/silog_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; JPA only validates it matches
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # Safe for existing (non-empty) databases

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:silog-super-secret-key-for-development-only-2024!!}
  expiration: ${JWT_EXPIRATION:86400000}
